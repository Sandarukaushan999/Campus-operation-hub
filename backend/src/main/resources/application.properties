spring.application.name=smart-campus-backend
server.port=8080

# MongoDB connection.
# In Docker this value is overridden by the SPRING_DATA_MONGODB_URI env var
# (which docker-compose reads from the project root .env file).
# The default below is a local MongoDB for anyone running the backend
# WITHOUT docker.
spring.data.mongodb.uri=mongodb://localhost:27017/smartcampusdb

# JWT signing settings.
# In Docker these are overridden by APP_SECURITY_JWT_SECRET and
# APP_SECURITY_JWT_EXPIRATION_SECONDS from the .env file.
# Secret below is a clearly-unsafe placeholder for local dev only; JwtService
# rejects anything shorter than 32 chars at startup. The prod profile reads
# the value from env and fails fast if it is missing.
app.security.jwt-secret=local-dev-only-secret-change-me-please
app.security.jwt-expiration-seconds=86400

# Module C - file upload settings (ticket attachments)
app.storage.upload-dir=./uploads/tickets
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=8MB

# Logging
logging.level.root=INFO
logging.level.com.campus=INFO
logging.level.org.springframework.web=INFO

# Actuator: only expose health for Docker readiness checks.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
