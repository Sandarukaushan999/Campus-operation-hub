# Test configuration.
#
# Provides safe defaults so `@SpringBootTest` smoke tests can load the Spring
# context without a real MongoDB reachable or real env vars set. Actual
# repository interactions are mocked in the unit tests.
spring.data.mongodb.uri=mongodb://localhost:27017/smartcampus_test
spring.data.mongodb.auto-index-creation=false

app.security.jwt-secret=test-only-secret-at-least-32-chars-long-123456
app.security.jwt-expiration-seconds=3600

app.storage.upload-dir=./uploads/test
